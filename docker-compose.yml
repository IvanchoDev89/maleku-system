services:
  postgres:
    image: postgres:16-alpine
    container_name: costarica_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-costaricatravel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # SECURITY: Only expose when needed for local debugging
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - costarica_network

  redis:
    image: redis:7-alpine
    container_name: costarica_redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-}"]
    # SECURITY: Only expose when needed for local debugging
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - costarica_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: costarica_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - costarica_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: costarica_backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/costaricatravel}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY environment variable must be set}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - BACKEND_CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
      - SITE_URL=http://localhost:3000
      - ENVIRONMENT=development
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_FROM=noreply@costaricatravel.local
      - SMTP_FROM_NAME=Costa Rica Travel
      - SMTP_USE_TLS=false
      - USE_SMTP_IN_DEV=true
      - EMAIL_FROM=noreply@costaricatravel.local
      - EMAIL_FROM_NAME=Costa Rica Travel
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/venv
    networks:
      - costarica_network
    command: /app/docker-entrypoint.sh

  backup:
    image: postgres:16-alpine
    container_name: costarica_backup
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
    volumes:
      - ./backups:/backups
      - ./scripts/backup-db.sh:/usr/local/bin/backup-db.sh:ro
    entrypoint: |
      sh -c "
      echo 'Backup container ready. Manual: docker compose exec backup backup-db.sh'
      tail -f /dev/null
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - costarica_network
    profiles:
      - backup

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: costarica_frontend
    environment:
      - NUXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NUXT_PUBLIC_SITE_URL=http://localhost:3000
      - NUXT_PUBLIC_ENVIRONMENT=development
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - costarica_network
    command: /app/docker-entrypoint.sh

  prometheus:
    image: prom/prometheus:latest
    container_name: costarica_prometheus
    volumes:
      - ./infraestructura/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - costarica_network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: costarica_grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infraestructura/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infraestructura/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - costarica_network
    profiles:
      - monitoring

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  costarica_network:
    driver: bridge
