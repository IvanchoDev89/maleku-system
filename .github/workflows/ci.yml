name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting with Ruff
        run: ruff format --check --diff .

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with Nuxt
        run: npx nuxt build 2>&1 | tail -5

  test-backend:
    name: Test Backend
    needs: lint-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crtravel
          POSTGRES_PASSWORD: crtravel123
          POSTGRES_DB: costaricatravel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://crtravel:crtravel123@localhost:5432/costaricatravel_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-1234567890
          ENVIRONMENT: test
        run: |
          pytest -v --tb=short -x

  test-frontend:
    name: Test Frontend
    needs: lint-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bandit security scan (backend)
        uses: tj-actions/bandit@v6
        with:
          path: backend/
          options: -r -ll

      - name: npm audit (frontend)
        working-directory: frontend
        run: |
          npm audit --audit-level=high || echo "Vulnerabilities found - review manually"

  deploy-staging:
    name: Deploy Staging
    if: github.ref == 'refs/heads/develop'
    needs: [test-backend, test-frontend, security-scan]
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Add host to known_hosts
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          if [ -n "$STAGING_HOST" ]; then
            mkdir -p ~/.ssh
            ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          fi

      - name: Deploy to staging
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_KEY: ${{ secrets.STAGING_KEY }}
          DEPLOY_PATH: ${{ secrets.STAGING_PATH || '/opt/costaricatravel-staging' }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "Staging host not configured — skipping deploy"
            exit 0
          fi
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd $DEPLOY_PATH && \
             git pull origin develop && \
             docker compose -f docker-compose.staging.yml up -d --build && \
             sleep 15 && \
             curl -sf http://localhost:8000/health/ready && \
             docker compose -f docker-compose.staging.yml exec -T backend alembic upgrade head && \
             echo 'Staging deploy successful'" || \
            (echo "Staging deploy failed" && exit 1)

  deploy:
    name: Deploy Production
    if: github.ref == 'refs/heads/main'
    needs: [test-backend, test-frontend, security-scan, deploy-staging]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Add host to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -n "$DEPLOY_HOST" ]; then
            mkdir -p ~/.ssh
            ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          fi

      - name: Create DB backup before deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            docker run --rm -e DATABASE_URL="$DATABASE_URL" postgres:16-alpine sh -c \
              'pg_dump "$DATABASE_URL" | gzip > /tmp/predeploy-backup.sql.gz'
          fi

      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/costaricatravel' }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "DEPLOY_HOST not configured — skipping deploy"
            exit 0
          fi
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd $DEPLOY_PATH && \
             git pull origin main && \
             docker compose up -d --build && \
             sleep 15 && \
             curl -sf http://localhost:8000/health/ready && \
             docker compose exec -T backend alembic upgrade head && \
             echo 'Deploy successful'" || \
            (echo "Deploy failed — attempting rollback" && \
             ssh -i ~/.ssh/deploy_key \
               "$DEPLOY_USER@$DEPLOY_HOST" \
               "cd $DEPLOY_PATH && docker compose down && git checkout HEAD~1 && docker compose up -d --build && \
                sleep 15 && docker compose exec -T backend alembic upgrade head && \
                echo 'Rollback completed'")
