services:
  postgres_test:
    image: postgres:16-alpine
    container_name: costarica_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: costaricatravel_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs: /var/lib/postgresql/data

  redis_test:
    image: redis:7-alpine
    container_name: costarica_redis_test
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10

  mailhog_test:
    image: mailhog/mailhog:latest
    container_name: costarica_mailhog_test
    ports:
      - "1026:1025"
      - "8026:8025"
